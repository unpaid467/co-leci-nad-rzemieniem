<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co leci nad Rzemieniem</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #080f1e;
            color: #dce8ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        #header {
            background: linear-gradient(135deg, #0b1628 0%, #112040 100%);
            border-bottom: 1px solid #1e3a70;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 14px rgba(0,80,220,0.25);
            z-index: 10;
        }

        #header h1 {
            font-size: 1.35rem;
            color: #80bbff;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 0 24px rgba(80,160,255,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header h1 .plane-emoji {
            font-size: 1.5rem;
            animation: flyIn 0.6s ease-out;
        }

        @keyframes flyIn {
            from { transform: translateX(-30px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }

        #status-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.82rem;
            color: #7a9abf;
        }

        .pulse-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #44aa66;
            box-shadow: 0 0 6px #44aa66;
            animation: blink 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        .pulse-dot.error   { background: #cc3344; box-shadow: 0 0 6px #cc3344; animation: none; }
        .pulse-dot.loading { background: #ccaa22; box-shadow: 0 0 6px #ccaa22; }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.25; }
        }

        #refresh-btn {
            background: #122444;
            border: 1px solid #1e4080;
            color: #80bbff;
            padding: 5px 13px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s, border-color 0.2s;
        }
        #refresh-btn:hover { background: #1c3360; border-color: #3a6fd0; }
        #refresh-btn:active { transform: scale(0.97); }

        /* ── MAIN LAYOUT ── */
        #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

        #map { flex: 1; min-height: 0; height: 100%; }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 310px;
            background: #0b1728;
            border-left: 1px solid #1a3060;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar-header {
            padding: 12px 14px;
            background: #0e1f3e;
            border-bottom: 1px solid #1a3060;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        #sidebar-header h2 {
            font-size: 0.9rem;
            color: #88b8ff;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        #aircraft-count-badge {
            background: #1a3a72;
            color: #80bbff;
            font-size: 0.78rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            min-width: 32px;
            text-align: center;
            border: 1px solid #2a50a0;
        }

        #aircraft-list {
            flex: 1;
            overflow-y: auto;
            padding: 7px;
        }

        #aircraft-list::-webkit-scrollbar { width: 5px; }
        #aircraft-list::-webkit-scrollbar-track  { background: #080f1e; }
        #aircraft-list::-webkit-scrollbar-thumb  { background: #223060; border-radius: 3px; }

        .aircraft-card {
            background: #0f1e38;
            border: 1px solid #1c3264;
            border-radius: 9px;
            padding: 9px 11px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        }
        .aircraft-card:hover { background: #152844; border-color: #2e5aaa; }
        .aircraft-card.selected {
            background: #163060;
            border-color: #4a80dd;
            box-shadow: 0 0 12px rgba(74,128,221,0.35);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .card-callsign {
            font-size: 0.98rem;
            font-weight: 700;
            color: #7abfff;
        }

        .badge {
            font-size: 0.67rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .badge-ground { background: #1e3820; color: #77cc77; border: 1px solid #336633; }
        .badge-air    { background: #122244; color: #66aaff; border: 1px solid #224488; }

        .card-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2px 8px;
            font-size: 0.75rem;
            color: #6a8aaa;
        }
        .card-grid .val { color: #b8d0f0; font-weight: 500; }

        .no-planes {
            text-align: center;
            color: #3a5580;
            padding: 40px 16px;
            font-size: 0.88rem;
            line-height: 1.6;
        }
        .no-planes .big { font-size: 2.5rem; display: block; margin-bottom: 10px; opacity: 0.4; }

        .error-card {
            background: #2a0e18;
            border: 1px solid #662030;
            color: #ff8a9a;
            padding: 10px 12px;
            border-radius: 7px;
            font-size: 0.82rem;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        /* ── MAP TOOLTIP ── */
        .plane-label {
            background: rgba(8,16,36,0.88) !important;
            border: 1px solid #2a5090 !important;
            border-radius: 5px !important;
            color: #a0c8ff !important;
            font-size: 0.72rem !important;
            padding: 2px 6px !important;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }
        .plane-label::before { display: none; }

        /* ── LEAFLET POPUP STYLING ── */
        .leaflet-popup-content-wrapper {
            background: #0c1a30;
            border: 1px solid #2a5090;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,40,120,0.5);
            color: #dce8ff;
            padding: 0;
        }
        .leaflet-popup-content { margin: 0; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button {
            color: #6090cc !important;
            font-size: 18px !important;
            top: 8px !important; right: 10px !important;
        }

        .popup-inner { padding: 14px 16px; }

        .popup-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #7abfff;
            border-bottom: 1px solid #1e3868;
            padding-bottom: 8px;
            margin-bottom: 9px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .popup-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 10px;
            font-size: 0.82rem;
        }
        .popup-grid .lbl { color: #6a90b8; }
        .popup-grid .val { color: #c8e0ff; font-weight: 500; }

        .popup-fr24 {
            display: block;
            margin-top: 11px;
            text-align: center;
            background: #ff6600;
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .popup-fr24:hover { background: #e05500; }

        /* ── LEGEND ── */
        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(8,16,36,0.88);
            border: 1px solid #1e3868;
            border-radius: 8px;
            padding: 8px 12px;
            z-index: 500;
            font-size: 0.75rem;
            color: #8aaccc;
            line-height: 1.8;
        }
        .legend-item { display: flex; align-items: center; gap: 7px; }
        .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 740px) {
            #main { flex-direction: column-reverse; }
            #sidebar { width: 100%; height: 240px; border-left: none; border-top: 1px solid #1a3060; }
            #status-bar .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<div id="header">
    <h1>
        <span class="plane-emoji">✈</span>
        Co leci nad Rzemieniem
    </h1>
    <div id="status-bar">
        <span class="pulse-dot" id="status-dot"></span>
        <span id="last-update">Łączenie…</span>
        <span class="hide-mobile">Odświeżenie za: <span id="countdown" style="font-variant-numeric:tabular-nums">--</span> s</span>
        <button id="refresh-btn" onclick="manualRefresh()">⟳ Odśwież</button>
    </div>
</div>

<!-- ══════════════ MAIN ══════════════ -->
<div id="main">
    <div id="map"></div>

    <!-- ── SIDEBAR ── -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>✈ Samoloty w pobliżu</h2>
            <span id="aircraft-count-badge">0</span>
        </div>
        <div id="aircraft-list">
            <div class="no-planes">
                <span class="big">✈</span>
                Ładowanie danych lotniczych…
            </div>
        </div>
    </div>
</div>

<!-- ══════════════ LEGEND ══════════════ -->
<div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4ab4ff"></div> Samolot w locie</div>
    <div class="legend-item"><div class="legend-dot" style="background:#77cc77"></div> Na ziemi</div>
    <div class="legend-item"><div style="width:10px;height:2px;border-top:2px dashed #4a80d0"></div> Obszar Rzemienia</div>
    <div class="legend-item"><div style="width:10px;height:2px;border-top:1px dashed #2a5080"></div> Strefa obserwacji (~10 km)</div>
</div>

<!-- ══════════════ SCRIPTS ══════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ── CONFIGURATION ─────────────────────────────────────────
// Village polygon (GeoJSON lon,lat order)
const VILLAGE_COORDS = [
    [21.4871264, 50.2359697],
    [21.5400541, 50.2345103],
    [21.5378625, 50.1932384],
    [21.4847851, 50.1940726],
    [21.4871264, 50.2359697]
];

// ~10 km buffer added to each side
// At ~50°N: 1° lat ≈ 111.2 km → 10 km ≈ 0.090°
//            1° lon ≈  71.7 km → 10 km ≈ 0.139°
const FETCH_BOUNDS = {
    lamin: 50.1033,
    lomin: 21.3453,
    lamax: 50.3259,
    lomax: 21.6796
};

// Map center (centroid of village polygon)
const MAP_CENTER = [50.2148, 21.5124];
const MAP_ZOOM   = 11;

const REFRESH_SEC = 60; // seconds between auto-refreshes

// Optional: add OpenSky credentials for higher rate limits
// Leave empty strings for anonymous access (400 req/day)
const OPENSKY_USER = 'garlic837';
const OPENSKY_PASS = 'nNTY*0U3kdjQr^SKR5N64T';

// ── STATE ─────────────────────────────────────────────────
let map;
let markers     = {};  // icao24 → L.marker
let aircraftDB  = {};  // icao24 → parsed object
let selectedIcao = null;
let countdownId, refreshId;

// ── MAP INIT ──────────────────────────────────────────────
function initMap() {
    map = L.map('map', { center: MAP_CENTER, zoom: MAP_ZOOM, zoomSnap: 0.5 });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>',
        maxZoom: 18
    }).addTo(map);

    // Observation zone (outer dashed rectangle)
    L.rectangle(
        [[FETCH_BOUNDS.lamin, FETCH_BOUNDS.lomin], [FETCH_BOUNDS.lamax, FETCH_BOUNDS.lomax]],
        { color: '#2a5090', weight: 1, fillOpacity: 0, dashArray: '4 7' }
    ).addTo(map).bindTooltip('Strefa obserwacji (~10 km)', { className: 'plane-label', sticky: true });

    // Village polygon
    const villageLatLng = VILLAGE_COORDS.map(c => [c[1], c[0]]);
    L.polygon(villageLatLng, {
        color: '#4a80d0', weight: 2,
        fillColor: '#4a80d0', fillOpacity: 0.08,
        dashArray: '6 4'
    }).addTo(map).bindTooltip('Obszar Rzemienia', { className: 'plane-label', sticky: true });
}

// ── PLANE ICON ─────────────────────────────────────────────
function makePlaneIcon(heading, onGround, isSelected) {
    const color  = onGround  ? '#77cc77' : (isSelected ? '#ffd060' : '#4ab4ff');
    const stroke = isSelected ? '#ff9900' : '#071428';
    const sz     = isSelected ? 38 : 30;

    // Top-down silhouette
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 60 60">
      <g transform="rotate(${heading || 0},30,30)">
        <!-- fuselage -->
        <ellipse cx="30" cy="30" rx="4" ry="20" fill="${color}" stroke="${stroke}" stroke-width="1.5"/>
        <!-- wings -->
        <polygon points="30,24 54,40 30,36 6,40" fill="${color}" stroke="${stroke}" stroke-width="1.5"/>
        <!-- tail -->
        <polygon points="30,46 40,55 30,52 20,55" fill="${color}" stroke="${stroke}" stroke-width="1"/>
      </g>
    </svg>`;

    return L.divIcon({
        className: '',
        html: svg,
        iconSize:   [sz, sz],
        iconAnchor: [sz / 2, sz / 2],
        tooltipAnchor: [sz / 2 + 4, 0]
    });
}

// ── FORMATTERS ─────────────────────────────────────────────
function fmtAlt(m) {
    if (m == null) return 'N/D';
    return `${Math.round(m)} m\u00a0/\u00a0${Math.round(m * 3.28084)} ft`;
}
function fmtSpeed(ms) {
    if (ms == null) return 'N/D';
    return `${Math.round(ms * 3.6)} km/h`;
}
function fmtHeading(deg) {
    if (deg == null) return 'N/D';
    const dirs = ['N','NE','E','SE','S','SW','W','NW','N'];
    return `${Math.round(deg)}°\u00a0(${dirs[Math.round(deg / 45) % 8]})`;
}
function fmtVRate(vr) {
    if (vr == null) return '→ poziomo';
    if (vr >  1) return `↑ wznoszenie ${Math.round(vr * 60)} m/min`;
    if (vr < -1) return `↓ opadanie ${Math.round(Math.abs(vr) * 60)} m/min`;
    return '→ poziomo';
}
function fmtTime(ts) {
    if (!ts) return 'N/D';
    return new Date(ts * 1000).toLocaleTimeString('pl-PL');
}

// ── PARSE OPENSKY STATE VECTOR ─────────────────────────────
// https://openskynetwork.github.io/opensky-api/rest.html#response
function parseState(s) {
    return {
        icao24:      s[0],
        callsign:    (s[1] || '').trim() || s[0].toUpperCase(),
        country:     s[2] || 'Nieznany',
        timePosUTC:  s[3],
        lastContact: s[4],
        lon:         s[5],
        lat:         s[6],
        baroAlt:     s[7],
        onGround:    s[8],
        velocity:    s[9],
        heading:     s[10],
        vertRate:    s[11],
        geoAlt:      s[13],
        squawk:      s[14] || '–'
    };
}

// ── UPDATE ONE MARKER ──────────────────────────────────────
function upsertMarker(ac) {
    if (ac.lat == null || ac.lon == null) return;

    const isSelected = ac.icao24 === selectedIcao;
    const icon = makePlaneIcon(ac.heading, ac.onGround, isSelected);

    if (markers[ac.icao24]) {
        markers[ac.icao24].setLatLng([ac.lat, ac.lon]);
        markers[ac.icao24].setIcon(icon);
    } else {
        const m = L.marker([ac.lat, ac.lon], { icon })
            .addTo(map)
            .on('click', () => selectAircraft(ac.icao24));
        m.bindTooltip(ac.callsign, {
            permanent: false, className: 'plane-label', offset: [18, 0]
        });
        markers[ac.icao24] = m;
    }
}

// ── REMOVE STALE MARKERS ───────────────────────────────────
function pruneMarkers(activeIcaos) {
    const alive = new Set(activeIcaos);
    for (const icao of Object.keys(markers)) {
        if (!alive.has(icao)) {
            map.removeLayer(markers[icao]);
            delete markers[icao];
            delete aircraftDB[icao];
        }
    }
}

// ── SELECT / HIGHLIGHT ─────────────────────────────────────
function selectAircraft(icao) {
    const prev = selectedIcao;
    selectedIcao = icao;

    // Refresh icons
    [prev, icao].forEach(id => {
        if (id && markers[id] && aircraftDB[id]) {
            const ac = aircraftDB[id];
            markers[id].setIcon(makePlaneIcon(ac.heading, ac.onGround, id === icao));
        }
    });

    // Sidebar highlight
    document.querySelectorAll('.aircraft-card').forEach(el =>
        el.classList.toggle('selected', el.dataset.icao === icao)
    );
    const card = document.querySelector(`.aircraft-card[data-icao="${icao}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Show popup
    const ac = aircraftDB[icao];
    if (!ac || ac.lat == null) return;

    const fr24url = `https://www.flightradar24.com/${encodeURIComponent(ac.callsign)}`;

    L.popup({ maxWidth: 280, closeButton: true })
        .setLatLng([ac.lat, ac.lon])
        .setContent(`
            <div class="popup-inner">
                <div class="popup-title">
                    <span>${ac.onGround ? '🛬' : '✈'}</span>
                    ${escHtml(ac.callsign)}
                </div>
                <div class="popup-grid">
                    <span class="lbl">ICAO24:</span>  <span class="val">${escHtml(ac.icao24.toUpperCase())}</span>
                    <span class="lbl">Kraj:</span>     <span class="val">${escHtml(ac.country)}</span>
                    <span class="lbl">Pułap:</span>    <span class="val">${fmtAlt(ac.baroAlt)}</span>
                    <span class="lbl">Prędkość:</span> <span class="val">${fmtSpeed(ac.velocity)}</span>
                    <span class="lbl">Kurs:</span>     <span class="val">${fmtHeading(ac.heading)}</span>
                    <span class="lbl">Wertykalna:</span><span class="val">${fmtVRate(ac.vertRate)}</span>
                    <span class="lbl">Squawk:</span>   <span class="val">${escHtml(ac.squawk)}</span>
                    <span class="lbl">Ost. sygnał:</span><span class="val">${fmtTime(ac.lastContact)}</span>
                </div>
                <a class="popup-fr24" href="${fr24url}" target="_blank" rel="noopener noreferrer">
                    Otwórz w FlightRadar24 ↗
                </a>
            </div>`)
        .openOn(map);

    map.panTo([ac.lat, ac.lon], { animate: true });
}

// ── RENDER SIDEBAR LIST ────────────────────────────────────
function renderList(acList) {
    const listEl  = document.getElementById('aircraft-list');
    const countEl = document.getElementById('aircraft-count-badge');

    countEl.textContent = acList.length;

    if (acList.length === 0) {
        listEl.innerHTML = `
            <div class="no-planes">
                <span class="big">🛩</span>
                Brak samolotów w zasięgu.<br>
                <span style="font-size:0.78rem;opacity:0.7">Dane odświeżają się co ${REFRESH_SEC} sekund.</span>
            </div>`;
        return;
    }

    // Sort: airborne first (desc altitude), then on-ground
    const sorted = [...acList].sort((a, b) => {
        if (a.onGround !== b.onGround) return a.onGround ? 1 : -1;
        return (b.baroAlt || 0) - (a.baroAlt || 0);
    });

    listEl.innerHTML = sorted.map(ac => `
        <div class="aircraft-card${ac.icao24 === selectedIcao ? ' selected' : ''}"
             data-icao="${escAttr(ac.icao24)}"
             onclick="selectAircraft('${escAttr(ac.icao24)}')">
            <div class="card-top">
                <span class="card-callsign">✈ ${escHtml(ac.callsign)}</span>
                <span class="badge ${ac.onGround ? 'badge-ground' : 'badge-air'}">
                    ${ac.onGround ? 'Na ziemi' : 'W locie'}
                </span>
            </div>
            <div class="card-grid">
                <span>Kraj:</span>      <span class="val">${escHtml(ac.country)}</span>
                <span>Pułap:</span>     <span class="val">${ac.baroAlt != null ? Math.round(ac.baroAlt) + ' m' : 'N/D'}</span>
                <span>Prędkość:</span>  <span class="val">${ac.velocity != null ? Math.round(ac.velocity * 3.6) + ' km/h' : 'N/D'}</span>
                <span>Kurs:</span>      <span class="val">${ac.heading != null ? Math.round(ac.heading) + '°' : 'N/D'}</span>
            </div>
        </div>`).join('');
}

// ── FETCH DATA ─────────────────────────────────────────────
async function fetchAircraft() {
    setStatus('loading', 'Pobieranie…');

    const { lamin, lomin, lamax, lomax } = FETCH_BOUNDS;
    let url = `https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`;

    const opts = {};
    if (OPENSKY_USER && OPENSKY_PASS) {
        opts.headers = { Authorization: 'Basic ' + btoa(`${OPENSKY_USER}:${OPENSKY_PASS}`) };
    }

    try {
        const resp = await fetch(url, opts);

        if (resp.status === 429) {
            throw new Error('Przekroczono limit zapytań API. Spróbuj za chwilę.');
        }
        if (!resp.ok) {
            throw new Error(`Serwer zwrócił błąd ${resp.status}`);
        }

        const data   = await resp.json();
        const states = data.states || [];
        const parsed = states
            .map(parseState)
            .filter(ac => ac.lat != null && ac.lon != null);

        // Update DB and markers
        parsed.forEach(ac => {
            aircraftDB[ac.icao24] = ac;
            upsertMarker(ac);
        });

        pruneMarkers(parsed.map(ac => ac.icao24));
        renderList(parsed);

        const now = new Date().toLocaleTimeString('pl-PL');
        setStatus('ok', `Aktualizacja: ${now} — ${parsed.length} obiektów`);
        clearError();

    } catch (err) {
        console.error('[leci-rzemieniem]', err);
        setStatus('error', 'Błąd połączenia');
        showError(err.message);
    }

    startCountdown();
}

// ── COUNTDOWN ─────────────────────────────────────────────
function startCountdown() {
    clearInterval(countdownId);
    clearTimeout(refreshId);

    let remaining = REFRESH_SEC;
    const el = document.getElementById('countdown');
    el.textContent = remaining;

    countdownId = setInterval(() => {
        remaining = Math.max(0, remaining - 1);
        el.textContent = remaining;
        if (remaining === 0) clearInterval(countdownId);
    }, 1000);

    refreshId = setTimeout(fetchAircraft, REFRESH_SEC * 1000);
}

function manualRefresh() {
    clearInterval(countdownId);
    clearTimeout(refreshId);
    fetchAircraft();
}

// ── STATUS HELPERS ─────────────────────────────────────────
function setStatus(type, text) {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('last-update');
    dot.className = `pulse-dot${type === 'ok' ? '' : ' ' + type}`;
    lbl.textContent = text;
}

function showError(msg) {
    const listEl = document.getElementById('aircraft-list');
    clearError();
    const d = document.createElement('div');
    d.className = 'error-card';
    d.id = 'api-error';
    d.innerHTML = `<strong>⚠ Błąd API</strong><br>${escHtml(msg)}`;
    listEl.prepend(d);
}

function clearError() {
    const e = document.getElementById('api-error');
    if (e) e.remove();
}

// ── SECURITY: HTML/ATTR ESCAPING ───────────────────────────
function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}
function escAttr(str) {
    return String(str).replace(/[^a-zA-Z0-9_-]/g, '_');
}

// ── BOOT ──────────────────────────────────────────────────
initMap();
fetchAircraft();
</script>
